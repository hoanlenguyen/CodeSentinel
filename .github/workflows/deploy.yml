name: Deploy to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Zip application
        run: |
          zip -r app.zip . \
            --exclude "*.git*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".env" \
            --exclude "review_output.md" \
            --exclude "app.zip"

      - name: Deploy via Kudu ZIP deploy
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASS }}
        run: |
          curl -X POST \
            "https://codesentinel-ai-review.scm.azurewebsites.net/api/zipdeploy" \
            -u "${DEPLOY_USER}:${DEPLOY_PASS}" \
            -H "Content-Type: application/zip" \
            --data-binary @app.zip \
            --fail \
            --silent \
            --show-error
          echo "Deployment complete ✓"
